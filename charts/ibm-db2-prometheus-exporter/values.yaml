replicaCount: 1

image:
  registry: ghcr.io
  repository: davidkarlsen/ibm-db2-prometheus-exporter
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: master

args:
- --log.level=info
- --log.format=json

imagePullSecrets: []

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}

podAnnotations: {}

podSecurityContext: {}

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 80

serviceMonitor:
  create: true

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 5m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

existingSecret: ""

# settings for DB2
db2:
  port: 50000
  userId: db2inst1
  # database: SOMEDB
  # hostname: someHost
  # password: somePw - you can also refer to an existingSecret with key DB2PASSWORD

alerts:
  enabled: true
  groups:
  - name: ibm-db2-alerts
    rules:
    - alert: IBMDB2LockTimeouts
      annotations:
        description: There are lock timeouts occurring in the database {{$labels.database_name}}.
        summary: There are lock timeouts occurring in the database {{$labels.database_name}}.
      expr: sum without (job) (rate(ibm_db2_lock_timeout_total[5m])) > 0
      for: 5m
      labels:
        severity: warning
    - alert: IBMDB2HighLockWaitTime
      # see https://github.com/grafana/ibm-db2-prometheus-exporter/issues/41
      annotations:
        description: The average amount of time waiting for locks to become free is {{ printf "%.2f" $value }}ms for {{$labels.database_name}} which is above the threshold of 2000ms.
        summary: The average amount of time waiting for locks to become free is abnormally large.
      expr: |
        sum without (job) (rate(ibm_db2_lock_wait_time[5m])) > 2000
      for: 5m
      labels:
        severity: warning
    - alert: IBMDB2HighNumberOfDeadlocks
      annotations:
        description: The number of deadlocks is at {{ printf "%.2f" $value }} for {{$labels.database_name}} which is above the threshold of 5.
        summary: There are deadlocks occurring in the database.
      expr: |
        sum without (job) (increase(ibm_db2_deadlock_total[5m])) > 5
      for: 5m
      labels:
        severity: critical
    - alert: IBMDB2LogUsageReachingLimit
      annotations:
        description: The amount of log space being used by the DB2 instance is at {{ printf "%.2f" $value }}% which is above the threshold of 90%.
        summary: The amount of log space available for the DB2 instance is running out of space, rotate logs or delete unnecessary storage usage.
      expr: |
        100 * sum without (job,log_usage_type) (ibm_db2_log_usage{log_usage_type="used"}) / sum without (job,log_usage_type) (ibm_db2_log_usage{log_usage_type="available"}) > 90
      for: 5m
      labels:
        severity: warning
  